name: Link check

# Fails the build if any internal link or #anchor is broken — guards against
# the MkDocs->flat-HTML migration regression coming back.
on:
  push:
  pull_request:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check internal links and anchors
        run: python3 tools/check-links.py
