name: Build Bundles

# The matrix publishes:
#   * clean bundles for Linux (x86_64), Windows (x86_64), macOS (arm64 only)
#   * clean bundle for Linux arm64 via QEMU, aimed at Raspberry Pi OS 64-bit
#   * full bundle for Linux (x86_64) — includes the HIL bridge
#   * full bundle for Linux arm64 via QEMU, aimed at Raspberry Pi + SIMtrace2
#   * a Debian package wrapping the clean Linux x86_64 bundle
#
# See guides/INSTALL_CLEAN.md, guides/INSTALL_FULL.md, and
# guides/INSTALL_RASPBERRYPI.md for how each artefact is expected to be
# consumed downstream.
#
# The full ``tests/`` pytest sweep is intentionally out of scope here;
# run it locally when changing behaviour covered by the suite.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  docs-strict:
    name: Docs (mkdocs --strict)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Mirror repo docs into site-docs/sources/
        shell: bash
        run: python site-docs/_tools/mirror_source_docs.py

      - name: Build docs (strict)
        shell: bash
        run: mkdocs build --strict

  build-linux-x86_64:
    name: Linux x86_64 (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [clean, full]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      clean_artifact_name: ${{ steps.meta.outputs.clean_artifact_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve package metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])")
          FLAVOR="${{ matrix.flavor }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=yggdrasim-linux-x86_64-${FLAVOR}-${VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${FLAVOR}" = "clean" ]; then
            echo "clean_artifact_name=yggdrasim-linux-x86_64-clean-${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpcsclite-dev pcscd swig pkg-config gpg

      - name: Install Python dependencies (clean)
        if: matrix.flavor == 'clean'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[build,test]'

      - name: Install Python dependencies (full)
        if: matrix.flavor == 'full'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[full]'

      - name: Build Linux bundle
        env:
          YGGDRASIM_FLAVOR: ${{ matrix.flavor }}
        run: python -m PyInstaller --noconfirm --clean yggdrasim_main.spec

      - name: Smoke test Linux bundle
        shell: bash
        env:
          YGGDRASIM_FLAVOR: ${{ matrix.flavor }}
        run: |
          BIN="dist/yggdrasim-${{ matrix.flavor }}"
          chmod +x "${BIN}"
          "${BIN}" --version
          "${BIN}" --doctor || true

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist/yggdrasim-${{ matrix.flavor }}
          if-no-files-found: error

  build-linux-arm64-clean:
    name: Linux arm64 clean (Raspberry Pi)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Resolve package metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(python3 -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=yggdrasim-linux-arm64-clean-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build arm64 bundle inside Debian container
        shell: bash
        # ``python3-dev`` is required for the ``pyscard`` C extension build
        # (it pulls in ``Python.h``); ``git`` is required by pip when an
        # extra resolves to a ``git+https://`` source. The clean flavor does
        # not currently consume ``saip`` (which uses git+), but the clean
        # ``[build,test]`` extras keep us future-proof against transitive
        # changes.
        run: |
          mkdir -p dist
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/src -w /src \
            -e YGGDRASIM_FLAVOR=clean \
            debian:bookworm-slim bash -lc '
              set -eux
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                python3 python3-pip python3-venv python3-dev \
                libpcsclite-dev pcscd swig pkg-config gpg git \
                build-essential
              python3 -m venv /opt/venv
              . /opt/venv/bin/activate
              python -m pip install --upgrade pip
              python -m pip install -e ".[build,test]"
              python -m PyInstaller --noconfirm --clean yggdrasim_main.spec
              chmod +x dist/yggdrasim-clean
              dist/yggdrasim-clean --version
            '

      - name: Upload arm64 bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist/yggdrasim-clean
          if-no-files-found: error

  build-linux-arm64-full:
    name: Linux arm64 full (Raspberry Pi + HIL)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Resolve package metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(python3 -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=yggdrasim-linux-arm64-full-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build arm64 full bundle inside Debian container
        shell: bash
        # The ``full`` extra resolves ``pySim`` from a ``git+https://``
        # source, so ``git`` must be present in the container. ``python3-dev``
        # supplies ``Python.h`` for the ``pyscard`` C extension build.
        run: |
          mkdir -p dist
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/src -w /src \
            -e YGGDRASIM_FLAVOR=full \
            debian:bookworm-slim bash -lc '
              set -eux
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                python3 python3-pip python3-venv python3-dev \
                libpcsclite-dev pcscd swig pkg-config gpg git \
                libudev-dev build-essential
              python3 -m venv /opt/venv
              . /opt/venv/bin/activate
              python -m pip install --upgrade pip
              python -m pip install -e ".[full]"
              python -m PyInstaller --noconfirm --clean yggdrasim_main.spec
              chmod +x dist/yggdrasim-full
              dist/yggdrasim-full --version
            '

      - name: Upload arm64 full bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist/yggdrasim-full
          if-no-files-found: error

  build-windows-clean:
    name: Windows x86_64 clean
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve package metadata
        id: meta
        shell: pwsh
        run: |
          $version = python -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])"
          "version=$version" >> $env:GITHUB_OUTPUT
          "artifact_name=yggdrasim-windows-x86_64-clean-$version" >> $env:GITHUB_OUTPUT

      - name: Install Windows build dependencies
        shell: pwsh
        run: choco install swig -y

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[build,test]'

      - name: Build Windows bundle
        shell: pwsh
        env:
          YGGDRASIM_FLAVOR: clean
        run: python -m PyInstaller --noconfirm --clean yggdrasim_main.spec

      - name: Smoke test Windows bundle
        shell: pwsh
        run: |
          .\dist\yggdrasim-clean.exe --version

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist/yggdrasim-clean.exe
          if-no-files-found: error

  build-macos-clean:
    name: macOS arm64 clean
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve package metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=yggdrasim-macos-arm64-clean-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install macOS build dependencies
        shell: bash
        run: |
          brew update
          brew install swig || true

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[build,test]'

      - name: Build macOS bundle
        shell: bash
        env:
          YGGDRASIM_FLAVOR: clean
        run: python -m PyInstaller --noconfirm --clean yggdrasim_main.spec

      - name: Smoke test macOS bundle
        shell: bash
        run: |
          chmod +x dist/yggdrasim-clean
          dist/yggdrasim-clean --version

      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist/yggdrasim-clean
          if-no-files-found: error

  build-linux-deb-clean:
    name: Debian package (clean)
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86_64

    steps:
      - name: Download clean Linux bundle
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.build-linux-x86_64.outputs.clean_artifact_name }}
          path: dist

      - name: Build Debian package
        id: deb
        shell: bash
        run: |
          VERSION="${{ needs.build-linux-x86_64.outputs.version }}"
          ARCH="$(dpkg --print-architecture)"
          PKGROOT="$RUNNER_TEMP/yggdrasim-deb"
          DEB_NAME="yggdrasim-clean_${VERSION}_${ARCH}.deb"
          mkdir -p "$PKGROOT/DEBIAN" "$PKGROOT/usr/lib/yggdrasim" "$PKGROOT/usr/bin"
          install -m 0755 dist/yggdrasim-clean "$PKGROOT/usr/lib/yggdrasim/yggdrasim"
          ln -s ../lib/yggdrasim/yggdrasim "$PKGROOT/usr/bin/yggdrasim"
          cat > "$PKGROOT/DEBIAN/control" <<EOF
          Package: yggdrasim-clean
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: GitHub Actions
          Depends: libpcsclite1, pcscd, gpg
          Description: YggdraSIM secure-element and eUICC toolkit (clean flavor, no HIL bridge)
          EOF
          dpkg-deb --build "$PKGROOT" "dist/${DEB_NAME}"
          echo "artifact_name=yggdrasim-linux-deb-clean-${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_path=dist/${DEB_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.deb.outputs.artifact_name }}
          path: ${{ steps.deb.outputs.artifact_path }}
          if-no-files-found: error

