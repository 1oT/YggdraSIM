name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: YggdraSIM-linux
            binary_path: dist/YggdraSIM
          - os: windows-latest
            artifact_name: YggdraSIM-windows
            binary_path: dist/YggdraSIM.exe

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y pcscd libpcsclite-dev swig

    - name: Install System Dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install swig -y

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m pip install pyinstaller

    - name: Build with PyInstaller spec
      run: |
        python -m PyInstaller --noconfirm --clean yggdrasim.spec

    - name: Smoke test binary (Linux)
      if: runner.os == 'Linux'
      run: |
        chmod +x dist/YggdraSIM
        ./dist/YggdraSIM --help

    - name: Smoke test binary (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        .\dist\YggdraSIM.exe --help

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.binary_path }}