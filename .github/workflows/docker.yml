name: Docker Image

on:
  push:
    branches: [main, master, "release/**"]
    tags:
      - "v*"
  pull_request:
    branches: [main, master, "release/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/yggdrasim

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Smoke build Docker image
        shell: bash
        run: docker build -t yggdrasim-ci:local .

      - name: Smoke test Docker image
        shell: bash
        # ``--version`` exercises console-script registration, venv
        # activation in the entrypoint, and argparse wiring without
        # requiring a PC/SC daemon, a SIMtrace2 board, or a relay
        # endpoint -- none of which exist inside a single-shot CI
        # container. A real session would call ``_run_startup_preflight``
        # which short-circuits cleanly when pcscd is unreachable but
        # still aborts with a non-zero exit, so it is not a meaningful
        # smoke target without hardware. The non-root assertion confirms
        # the Dockerfile's ``USER yggdrasim`` layer is intact.
        run: |
          docker run --rm yggdrasim-ci:local yggdrasim-scp11 --version
          docker run --rm yggdrasim-ci:local sh -c 'id -u && test "$(id -u)" = "1000"'

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          # GITHUB_TOKEN works when the package is linked to this repo and
          # Actions access is granted. GHCR_TOKEN/GHCR_USERNAME are optional
          # fallbacks for private or pre-existing user packages that return
          # 403 during blob HEAD checks even though this workflow requests
          # ``packages: write``.
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}

      - name: Extract Docker metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
