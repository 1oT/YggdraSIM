name: Docker Image

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Smoke build Docker image
        shell: bash
        run: docker build -t yggdrasim-ci:local .

      - name: Smoke test Docker image
        shell: bash
        run: docker run --rm yggdrasim-ci:local yggdrasim-scp11 --cmd "HELP; EXIT"

      - name: Doctor + version smoke test
        shell: bash
        # ``--version`` exercises console-script registration and
        # ``--doctor`` validates the preflight surface against the installed
        # runtime root. ``|| true`` is acceptable on --doctor because the
        # container does not ship pcscd / SIMtrace2 and some probes are
        # expected to emit WARN in a stripped image.
        run: |
          docker run --rm yggdrasim-ci:local yggdrasim-scp11 --version
          docker run --rm yggdrasim-ci:local yggdrasim-scp11 --doctor || true

      - name: Non-root user smoke test
        shell: bash
        # The Dockerfile switches to ``uid=1000`` for the default command;
        # this asserts that the shipped entrypoint still works without
        # ``--user root`` overrides. A regression in the USER/chown layer
        # would surface here as an ``ImportError`` or a permission denied
        # on ``/opt/YggdraSIM-data``.
        run: |
          docker run --rm yggdrasim-ci:local sh -c 'id -u && test "$(id -u)" = "1000"'

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/yggdrasim
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
