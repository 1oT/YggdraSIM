# --------------------------------------------------------------------------
# mkdocs.oneot.yml
# Second visual variant of the YggdraSIM docs. Shares the same source tree
# (site-docs/) and navigation as mkdocs.yml, but swaps the Nord palette for
# the 1oT brand system (mint/emerald primary, Manrope display, Inter body,
# navy footer, white header) and writes to a separate output directory so
# both variants can be previewed side-by-side.
#
# Serve locally:
#     python -m mkdocs serve -f mkdocs.oneot.yml -a 127.0.0.1:8010
# Build static output to site-oneot/:
#     python -m mkdocs build -f mkdocs.oneot.yml
# --------------------------------------------------------------------------

site_name: YggdraSIM — A 1oT OSS initiative
site_description: Secure-element, eUICC, OTA, SCP11, HIL bridge, and SAIP toolkit documentation.
site_author: Hampus Hellsberg
site_url: https://hampushellsberg-dev.github.io/YggdraSIM/oneot/
repo_url: https://github.com/hampushellsberg-dev/YggdraSIM
repo_name: hampushellsberg-dev/YggdraSIM
edit_uri: edit/main/site-docs/
docs_dir: site-docs
site_dir: site-oneot
strict: true
copyright: Copyright &copy; 2026 1oT OÜ. Authored by Hampus Hellsberg. Documentation released under the project license.

extra_css:
  - https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap
  - assets/stylesheets/oneot.css

extra_javascript:
  - assets/javascripts/mermaid-zoom.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hampushellsberg-dev/YggdraSIM
      name: YggdraSIM source repository
  generator: false

theme:
  name: material
  font: false
  logo: assets/images/yggdrasil-mark.svg
  favicon: assets/images/yggdrasil-mark.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.indexes
    - navigation.tracking
    - toc.follow
    - toc.integrate
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
      toc_depth: 4
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.betterem
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
      check_paths: true
      auto_append:
        - site-docs/_includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: hampushellsberg-dev
      repo: YggdraSIM

